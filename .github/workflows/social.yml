name: Laura — Posts TikTok/Instagram automatiques

on:
  schedule:
    - cron: '0 8 * * *'   # tous les jours à 8h UTC (10h Paris)
  workflow_dispatch:

jobs:
  social:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lancer Laura
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/social-auto.js

      - name: Commit et push si nouveaux posts
        run: |
          git config user.name "Laura — Le Clam"
          git config user.email "marketing@leclam.fr"
          git add "Le clam/data/social-posts.json"
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
          else
            SUMMARY=$(cat .social-summary 2>/dev/null || echo "nouveaux posts")
            git commit -m "social auto $(date '+%Y-%m-%d') — $SUMMARY"
            git push
          fi
