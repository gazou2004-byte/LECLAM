  <!-- ── Vérification de majorité ── -->
  <div id="age-gate" style="
    display:none;
    position:fixed;inset:0;z-index:99999;
    background:rgba(10,4,20,.95);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    align-items:center;justify-content:center;
  ">
    <div style="
      background:#120820;
      border:1px solid #6b3fa0;
      border-radius:20px;
      padding:2.8rem 2.4rem;
      max-width:420px;width:90%;
      text-align:center;
      box-shadow:0 24px 80px rgba(0,0,0,.8);
    ">
      <div style="margin-bottom:.8rem"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#d9c4a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <h2 data-i18n="poppers.adult_title" style="font-family:'Playfair Display',serif;color:#d9c4a0;font-size:1.4rem;font-weight:700;margin:0 0 .6rem">Accès réservé aux adultes</h2>
      <p id="age-msg" style="color:#a89070;font-size:.88rem;line-height:1.65;margin:0 0 1.8rem"></p>
      <div style="display:flex;flex-direction:column;gap:.75rem">
        <button id="age-yes" style="
          padding:.85rem;background:#7c3aed;color:#fff;
          border:none;border-radius:50px;font-size:.95rem;
          font-weight:700;cursor:pointer;font-family:inherit;
          transition:background .2s;
        " onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#7c3aed'">
        </button>
        <button id="age-no" style="
          padding:.7rem;background:transparent;color:#a89070;
          border:1px solid #6b3fa0;border-radius:50px;font-size:.85rem;
          font-weight:600;cursor:pointer;font-family:inherit;
          transition:opacity .2s;
        " onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">
          <span data-i18n="poppers.age_no">Non, me ramener à l'accueil</span>
        </button>
      </div>
      <p id="age-legal" style="color:#4a2d6a;font-size:.68rem;margin:1.2rem 0 0;line-height:1.5"></p>
    </div>
  </div>

  <script>
  (function() {
    const AGE_MAP = {
      'fr': { age: 18, pays: 'France / Belgique / Luxembourg' },
      'fr-FR': { age: 18, pays: 'France' },
      'fr-BE': { age: 18, pays: 'Belgique' },
      'fr-LU': { age: 18, pays: 'Luxembourg' },
      'fr-CH': { age: 18, pays: 'Suisse' },
      'de':    { age: 18, pays: 'Allemagne / Autriche / Suisse' },
      'it':    { age: 18, pays: 'Italie' },
      'es':    { age: 18, pays: 'Espagne' },
      'nl':    { age: 18, pays: 'Pays-Bas' },
      'en':    { age: 18, pays: 'votre pays' },
      'en-GB': { age: 18, pays: 'Royaume-Uni' },
      'en-US': { age: 18, pays: 'États-Unis' },
      'ko':    { age: 19, pays: 'Corée du Sud' },
    };

    const KEY     = 'leclam_age_poppers';  /* clé séparée de plaisir.html */
    const EXPIRES = 60 * 60 * 1000;        /* 1 heure */
    const gate    = document.getElementById('age-gate');

    const lang = navigator.language || navigator.languages?.[0] || 'fr';
    const info = AGE_MAP[lang] || AGE_MAP[lang.split('-')[0]] || { age: 18, pays: 'votre pays' };
    const age  = info.age;
    const pays = info.pays;

    function calcAge(birthday) {
      const b = new Date(birthday), t = new Date();
      let a = t.getFullYear() - b.getFullYear();
      if (t.getMonth() < b.getMonth() || (t.getMonth() === b.getMonth() && t.getDate() < b.getDate())) a--;
      return a;
    }

    /* 1. Compte client connecté avec date de naissance → accès direct */
    try {
      const u = JSON.parse(localStorage.getItem('leclam_user') || 'null');
      if (u && u.birthday && calcAge(u.birthday) >= age) return;
    } catch {}

    /* 2. Sans compte : cache 1h */
    const stored = localStorage.getItem(KEY);
    if (stored && Date.now() - parseInt(stored, 10) < EXPIRES) return;

    /* 3. Afficher la porte (textes traduits via I18n après i18nApplied) */
    function _showGate() {
      const _t = k => (typeof I18n !== 'undefined') ? I18n.t(k) : k;
      const tpl = s => s.replace(/\{\{age\}\}/g, age).replace(/\{\{country\}\}/g, pays);
      document.getElementById('age-msg').innerHTML   = tpl(_t('poppers.age_msg'));
      document.getElementById('age-yes').textContent = tpl(_t('poppers.age_yes'));
      document.getElementById('age-legal').textContent = tpl(_t('poppers.age_legal'));
      document.querySelectorAll('body > *:not(#age-gate)').forEach(el => el.style.visibility = 'hidden');
      gate.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    if (typeof I18n !== 'undefined' && I18n.locale) {
      _showGate();
    } else {
      document.addEventListener('i18nApplied', _showGate, { once: true });
      /* Fallback si i18nApplied ne se déclenche jamais */
      setTimeout(_showGate, 600);
    }

    document.getElementById('age-yes').addEventListener('click', function() {
      localStorage.setItem(KEY, Date.now().toString());
      gate.style.display = 'none';
      document.body.style.overflow = '';
      document.querySelectorAll('body > *:not(#age-gate)').forEach(el => el.style.visibility = '');
    });

    document.getElementById('age-no').addEventListener('click', function() {
      window.location.href = 'index.html';
    });
  })();
  </script>
