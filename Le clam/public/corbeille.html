<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/lc-favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corbeille — Le Clam</title>
<link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .corbeille-page { max-width: 760px; margin: 0 auto; padding: 6rem 1.5rem 4rem; }
    .corbeille-page h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: .3rem; color: #1a1a1a; }
    .corb-sub { color: #999; font-size: .9rem; margin-bottom: 2rem; }

    @media (max-width: 640px) {
      .corbeille-page { padding: 5rem 1rem 3rem; }
      .corbeille-page h1 { font-size: 1.5rem; }
    }
  </style></head>
<body>
  <div id="navbar-placeholder"></div>
  <div id="drawer-placeholder"></div>

  <div style="max-width:760px;margin:0 auto;padding:1.5rem 1rem 0">
    <a href="javascript:history.back()" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:600;color:#3e2a14;text-decoration:none;padding:.4rem .9rem;border:1.5px solid #e0d8cc;border-radius:20px;background:#fff;transition:background .15s"
      onmouseover="this.style.background='#f5f0e8'" onmouseout="this.style.background='#fff'">
      ← Retour
    </a>
  </div>

  <main class="corbeille-page">
    <h1 id="pageTitle" style="display:flex;align-items:center;gap:.45rem"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg> Corbeille</h1>
    <p class="corb-sub" id="histSubtitle">Historique des suppressions définitives</p>

    <div id="corbeilleContent">
      <div style="text-align:center;padding:2.5rem 1rem;color:#bbb">
        <div style="margin-bottom:.6rem"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></div>
        <div style="font-size:.9rem;font-weight:600">Chargement…</div>
      </div>
    </div>
  </main>

  <script src="js/app.js?v=11"></script>
  <script src="js/features.js"></script>
  <script>
    /* ─── Guard admin ─── */
    function waitForAuth(cb, retries) {
      retries = retries ?? 30;
      const user = (() => { try { return JSON.parse(localStorage.getItem('leclam_user')||'null'); } catch { return null; } })();
      if (user) { cb(user); return; }
      if (retries <= 0) { window.location.href = 'index.html'; return; }
      setTimeout(() => waitForAuth(cb, retries - 1), 100);
    }

    waitForAuth(function(user) {
      const isAdmin = user.role === 'admin' || user.role === 'owner';
      if (!isAdmin) { window.location.href = 'index.html'; return; }
      renderCorbeilleHistory();
    });

    /* ─── Rendering ─── */
    function renderCorbeilleHistory() {
      const history = (() => { try { return JSON.parse(localStorage.getItem('leclam_history')||'[]'); } catch { return []; } })();
      const content = document.getElementById('corbeilleContent');

      const cats = ['plaisir', 'malin', 'bebe'];
      const catLabel = { plaisir: 'Plaisir', malin: 'Malin', bebe: 'Bébé' };

      const subtitle = document.getElementById('histSubtitle');
      if (subtitle) subtitle.textContent = history.length
        ? `${history.length} élément${history.length > 1 ? 's' : ''} supprimé${history.length > 1 ? 's' : ''} définitivement`
        : 'Aucune suppression définitive pour l\'instant';

      if (!history.length) {
        content.innerHTML = `
          <div style="text-align:center;padding:2.5rem 1rem;color:#bbb">
            <div style="margin-bottom:.6rem"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></div>
            <div style="font-size:.9rem;font-weight:600">Historique vide</div>
            <div style="font-size:.8rem;margin-top:.25rem">Les suppressions définitives apparaîtront ici</div>
          </div>`;
        return;
      }

      const byCat = {};
      history.forEach(h => {
        const c = h.cat || 'autre';
        if (!byCat[c]) byCat[c] = [];
        byCat[c].push(h);
      });

      let html = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:.5rem">
          <div style="font-size:.82rem;color:#999">${history.length} élément${history.length > 1 ? 's' : ''} supprimé${history.length > 1 ? 's' : ''} définitivement</div>
          <button onclick="clearAllHistory()" style="padding:.35rem 1rem;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;color:#888;transition:all .15s"
            onmouseover="this.style.borderColor='#dc2626';this.style.color='#dc2626'" onmouseout="this.style.borderColor='#e0e0e0';this.style.color='#888'">
            Tout effacer
          </button>
        </div>`;

      cats.forEach(cat => {
        const items = byCat[cat];
        if (!items?.length) return;
        html += `
          <div style="margin-bottom:1.8rem">
            <div style="font-size:.72rem;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.65rem;padding-bottom:.4rem;border-bottom:1.5px solid #f0f0f0">
              ${catLabel[cat] || cat} — ${items.length} entrée${items.length > 1 ? 's' : ''}
            </div>`;
        items.forEach(h => {
          html += `
            <div style="display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 0;border-bottom:1px solid #f8f8f8">
              <div style="width:38px;height:38px;border-radius:10px;background:${h.type === 'photo' ? '#eff6ff' : '#fef9f0'};display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0">
                ${h.type === 'photo' ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:.86rem;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.name || h.id}</div>
                <div style="font-size:.73rem;color:#bbb;display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.2rem">
                  <span>${h.id}</span>
                  <span>·</span>
                  <span>${h.date || '—'}</span>
                  <span>·</span>
                  <span style="color:${h.action === 'vider' ? '#dc2626' : '#f59e0b'};font-weight:600">
                    ${h.action === 'vider' ? 'Vidage corbeille' : 'Suppression directe'}
                  </span>
                </div>
              </div>
              ${h.type === 'article' ? `
              <button onclick="restoreHistoryArticle('${h.id}','${h.cat}')"
                style="padding:.3rem .85rem;border:none;border-radius:20px;background:#dcfce7;color:#16a34a;font-size:.73rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
                ↩️ Restaurer
              </button>` : ''}
            </div>`;
        });
        html += `</div>`;
      });

      /* Catégories hors liste principale */
      Object.keys(byCat).filter(c => !cats.includes(c)).forEach(cat => {
        const items = byCat[cat];
        html += `<div style="margin-bottom:1.8rem">
          <div style="font-size:.72rem;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.65rem">${cat}</div>`;
        items.forEach(h => {
          html += `
            <div style="display:flex;gap:.75rem;padding:.55rem 0;border-bottom:1px solid #f8f8f8">
              <span style="flex-shrink:0;display:flex;align-items:center">${h.type === 'photo' ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'}</span>
              <div style="flex:1;font-size:.82rem;color:#555">${h.name || h.id} <span style="color:#bbb;font-size:.72rem">— ${h.date || ''}</span></div>
            </div>`;
        });
        html += `</div>`;
      });

      content.innerHTML = html;
    }

    function clearAllHistory() {
      if (!confirm('Effacer tout l\'historique de corbeille ?')) return;
      localStorage.removeItem('leclam_history');
      renderCorbeilleHistory();
    }

    function restoreHistoryArticle(id, cat) {
      const key = 'leclam_perma_' + cat;
      let perma = (() => { try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch { return []; } })();
      perma = perma.filter(i => i !== id);
      localStorage.setItem(key, JSON.stringify(perma));
      const dkey = 'leclam_deleted_' + cat;
      let deleted = (() => { try { return JSON.parse(localStorage.getItem(dkey)||'[]'); } catch { return []; } })();
      deleted = deleted.filter(i => i !== id);
      localStorage.setItem(dkey, JSON.stringify(deleted));
      /* Retirer de l'historique */
      const hist = (() => { try { return JSON.parse(localStorage.getItem('leclam_history')||'[]'); } catch { return []; } })();
      localStorage.setItem('leclam_history', JSON.stringify(hist.filter(h => h.id !== id)));
      renderCorbeilleHistory();
      alert(`Produit ${id} restauré. Il réapparaîtra sur la page ${cat} au prochain chargement.`);
    }
  </script>
</body>
</html>
